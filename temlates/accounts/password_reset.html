{% extends "common_code/base.html" %}
{% load static %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2 class="auth-title">Reset Password</h2>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}

            <button class="btn btn-primary w-100 mt-2">Send Reset Email</button>
        </form>
    </div>
</div>
{% endblock %}
