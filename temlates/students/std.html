{% if std %}
<table border="2px">
    <tr>
        <th>id</th>
        <th>student_id</th>
        <th>student_name</th>
        <th>student_email</th>
        <th>batch</th>
        <th>courses</th>
    </tr>
    {% for si in std %}
    <tr>
        <td>{{si.id}}</td>
        <td>{{si.student_id}}</td>
        <td>{{si.student_name}}</td>
        <td>{{si.student_email}}</td>
        <td>{{si.batch}}</td>
        <td>{{si.courses}}</td>
 
    </tr>

    {% endfor %}
</table>
{% endif %}
